<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Meal Picks">
<meta name="theme-color" content="#111111">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<title>Pick Your Meals</title>
<link rel="stylesheet" href="css/design-system.css">
<style>
#app{position:fixed;inset:0;overflow:hidden;background:#111;display:flex;flex-direction:column}
.fsafe{height:env(safe-area-inset-top,44px);background:#111;flex-shrink:0}
.cat-anchor{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--ink4);padding:10px 16px 5px;background:var(--bg)}
</style>
</head>
<body>
<div id="app">
  <div class="fsafe"></div>
  <div class="family-hero" style="flex-shrink:0">
    <div class="family-hero-sub">Pick your meals</div>
    <div class="family-hero-name" id="hero-name">Hey there</div>
    <div class="family-stat-row">
      <div class="family-stat"><div class="family-stat-num" style="color:#34c759" id="stat-sel">0</div><div class="family-stat-lbl">Selected</div></div>
      <div class="family-stat"><div class="family-stat-num" style="color:#ff9500" id="stat-total">—</div><div class="family-stat-lbl">Available</div></div>
      <div class="family-stat"><div class="family-stat-num" style="color:#fff">Beta</div><div class="family-stat-lbl">Version</div></div>
    </div>
  </div>
  <div id="name-wrap" style="background:var(--bg);flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:32px">
    <div style="font-size:20px;font-weight:700;color:var(--ink);text-align:center">Who's picking?</div>
    <div style="font-size:14px;color:var(--ink4);text-align:center;margin-bottom:8px">Select your name</div>
    <div id="name-btns" style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:280px"></div>
  </div>
  <div id="picker-wrap" class="hidden" style="flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)">
    <div class="chip-row" id="fchips" style="padding-top:10px">
      <div class="chip chip-active" data-f="all" onclick="fF('all')">All</div>
      <div class="chip chip-l" data-f="light" onclick="fF('light')"><span class="chip-dot" style="background:var(--light)"></span>Light</div>
      <div class="chip chip-b" data-f="balanced" onclick="fF('balanced')"><span class="chip-dot" style="background:var(--balanced)"></span>Balanced</div>
      <div class="chip chip-i" data-f="indulgent" onclick="fF('indulgent')"><span class="chip-dot" style="background:var(--indulgent)"></span>Indulgent</div>
      <div class="chip chip-cat" data-f="crockpot" onclick="fF('crockpot')">🫕</div>
      <div class="chip chip-cat" data-f="pasta" onclick="fF('pasta')">Pasta</div>
      <div class="chip chip-cat" data-f="chicken" onclick="fF('chicken')">Chicken</div>
      <div class="chip chip-cat" data-f="beef" onclick="fF('beef')">Beef</div>
      <div class="chip chip-cat" data-f="pork" onclick="fF('pork')">Pork</div>
      <div class="chip chip-cat" data-f="fish" onclick="fF('fish')">Fish</div>
      <div class="chip chip-cat" data-f="comfort" onclick="fF('comfort')">Comfort</div>
    </div>
    <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px" id="flist-scroll">
      <div id="flist"></div>
    </div>
    <div class="cta-float hidden" id="fcta">
      <button class="cta-btn" onclick="sendPicks()">Send My Picks <span class="cta-badge" id="fcta-n">0</span></button>
    </div>
  </div>
</div>
<div class="sheet-scrim" id="ss" onclick="cSheet()"></div>
<div class="sheet" id="sr"><div class="sheet-handle"></div><div class="sheet-scroll" id="srb"></div></div>
<div class="toast" id="toast"></div>
<script type="module">
import * as Meals from './js/meals.js';
import { sharePicksURL } from './js/picks-url.js';
import * as Store from './js/storage.js';

let name='', sel=new Set(), ff='all', as=null;
const CE={pasta:'🍝',chicken:'🍗',pork:'🥩',beef:'🥩',fish:'🐟',comfort:'🍲',crockpot:'🫕',camping:'⛺'};
window.fF=fF; window.fT=fT; window.fOR=fOR; window.sendPicks=sendPicks; window.pickName=pickName; window.cSheet=cSheet; window.showToast=showToast;

async function boot(){
  if('serviceWorker'in navigator)navigator.serviceWorker.register('/meal-planner/sw.js').catch(()=>{});
  await Meals.loadMeals([]);
  document.getElementById('stat-total').textContent=Meals.allMeals().length;
  renderNames();
}

function renderNames(){
  const fam=Store.getFamily().filter(m=>m.type==='decision'||m.role==='Household');
  const cols={Seth:'#34c759',Jared:'#ff9500',Michael:'#007aff',Rachael:'#af52de'};
  document.getElementById('name-btns').innerHTML=fam.map(m=>`
    <button onclick="pickName('${m.name}')" style="background:var(--surface);border:none;border-radius:var(--r14);padding:15px 20px;font-size:16px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent">
      <div style="width:38px;height:38px;border-radius:50%;background:${m.colour||cols[m.name]||'#8e8e93'};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff">${m.name[0]}</div>
      <span>${m.name}</span>
    </button>`).join('');
}

function pickName(n){
  name=n;
  document.getElementById('hero-name').textContent=`Hey ${n} 👋`;
  document.getElementById('name-wrap').classList.add('hidden');
  document.getElementById('picker-wrap').classList.remove('hidden');
  render();
}

function fF(f){
  ff=f;
  document.querySelectorAll('#fchips .chip').forEach(c=>{
    c.className='chip';
    if(c.dataset.f===f)c.classList.add('chip-active');
    else c.classList.add({light:'chip-l',balanced:'chip-b',indulgent:'chip-i'}[c.dataset.f]||'chip-cat');
  });
  render();
}

function render(){
  const f=ff;
  const filtered=Meals.allMeals().filter(m=>{
    if(f==='crockpot'&&!m.crockpot)return false;
    if(['pasta','chicken','pork','beef','fish','comfort','camping'].includes(f)&&m.cat!==f)return false;
    if(['light','balanced','indulgent'].includes(f)&&m.health!==f)return false;
    return true;
  });
  const g={};filtered.forEach(m=>{if(!g[m.cat])g[m.cat]=[];g[m.cat].push(m);});
  let h='';
  Meals.CAT_ORDER.forEach(cat=>{
    if(!g[cat]?.length)return;
    h+=`<div class="cat-anchor">${Meals.CAT_LABELS[cat]||cat}</div>`;
    g[cat].forEach(m=>{
      const s=sel.has(m.id);
      h+=`<div class="pill-wrap"><div class="pill${s?' pill-sel':''}" onclick="fT(${m.id})">
        <div class="pill-bar"></div>
        <div class="pill-inner">
          <div class="pill-check${s?' on':''}">${s?'✓':''}</div>
          <div style="font-size:14px;font-weight:${s?'500':'400'};color:var(--ink);flex:1">${m.crockpot?'🫕 ':''}${m.name}</div>
          <div class="pill-meta">${rp(m.health,true)}<button class="pill-recipe-btn" onclick="event.stopPropagation();fOR(${m.id})">Recipe</button></div>
        </div>
      </div></div>`;
    });
  });
  document.getElementById('flist').innerHTML=h||'<div style="text-align:center;padding:40px;color:var(--ink4)">No meals here</div>';
  const n=sel.size;
  document.getElementById('stat-sel').textContent=n;
  document.getElementById('fcta').classList.toggle('hidden',n===0);
  document.getElementById('fcta-n').textContent=n;
}

function fT(id){sel.has(id)?sel.delete(id):sel.add(id);render();}

async function sendPicks(){
  if(!name){showToast('Select your name first');return;}
  if(!sel.size){showToast('Select at least one meal');return;}
  const r=await sharePicksURL(name,[...sel]);
  if(r.method==='clipboard')showToast('Link copied — send to Jenn');
  else if(r.method==='manual'){setTimeout(()=>prompt('Copy this link:',r.url),300);}
}

function fOR(id){
  const m=Meals.getMeal(id);if(!m)return;
  const mac=m.macros||{};
  document.getElementById('srb').innerHTML=`
    <div class="sheet-header" style="flex-direction:column;align-items:flex-start;gap:6px">
      <div style="display:flex;align-items:flex-start;width:100%">
        <div style="flex:1"><div style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--ink4);margin-bottom:8px">${Meals.CAT_LABELS[m.cat]||m.cat}</div><div style="font-size:20px;font-weight:700;color:var(--ink)">${m.name}${m.crockpot?' 🫕':''}</div></div>
        <button class="sheet-close" onclick="cSheet()">✕</button>
      </div>
      <div style="display:flex;gap:6px">${rp(m.health)}</div>
    </div>
    ${m.fridge?.length?`<div class="recipe-section">Fridge</div>${m.fridge.map(i=>`<div class="recipe-ing-row"><span class="recipe-ing-name">${i}</span></div>`).join('')}`:''}
    ${m.pantry?.length?`<div class="recipe-section">Pantry</div>${m.pantry.map(i=>`<div class="recipe-ing-row"><span class="recipe-ing-name">${i}</span></div>`).join('')}`:''}
    ${m.recipe?.length?`<div class="recipe-section">Method</div>${m.recipe.map((s,i)=>`<div class="recipe-step"><div class="step-num">${i+1}</div><div class="step-body"><div class="step-text">${s}</div></div></div>`).join('')}`:''}
    <div class="macro-strip">
      <div class="macro-cell"><div class="macro-val">${mac.cal||'—'}</div><div class="macro-lbl">Cal</div></div>
      <div class="macro-cell"><div class="macro-val">${mac.pro||'—'}g</div><div class="macro-lbl">Protein</div></div>
      <div class="macro-cell"><div class="macro-val">${mac.fat||'—'}g</div><div class="macro-lbl">Fat</div></div>
      <div class="macro-cell"><div class="macro-val">${mac.sodium||'—'}</div><div class="macro-lbl">Sodium</div></div>
    </div>
    <div style="padding:12px 20px 40px"><button style="width:100%;background:var(--ink);color:#fff;border:none;border-radius:var(--r14);padding:14px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer" onclick="cSheet()">Done</button></div>`;
  as='sr';
  document.getElementById('ss').classList.add('visible');
  document.getElementById('sr').classList.add('open');
}

function cSheet(){
  if(!as)return;
  document.getElementById(as)?.classList.remove('open');
  document.getElementById('ss')?.classList.remove('visible');
  as=null;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function rp(h,sm=false){
  const m={light:['rp-l','rd-l','Light'],balanced:['rp-b','rd-b','Balanced'],indulgent:['rp-i','rd-i','Indulgent']};
  const [bg,dot,lbl]=m[h]||m.balanced;
  return`<span class="r-pill ${bg}" style="${sm?'font-size:10px;padding:3px 8px':''}"><span class="r-dot ${dot}"></span>${lbl}</span>`;
}

boot();
</script>
</body>
</html>
